<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANSULAIS — Catálogos</title>
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <style>
    @font-face {
      font-family: 'Helvetica LT Pro';
      src: url('tipografia/Helvetica LT Pro Roman.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Helvetica LT Pro';
      src: url('tipografia/Helvetica LT Pro Bold.ttf') format('truetype');
      font-weight: 700;
    }

    /* ── TEMAS ── */
    :root {
      --chrome-bg:     #fff6d7;
      --chrome-fg:     #0c1a29;
      --chrome-muted:  rgba(12,26,41,0.38);
      --chrome-faint:  rgba(12,26,41,0.18);
      --chrome-hover:  rgba(12,26,41,0.06);
      --book-bg:       #0c1a29;
      --book-fg:       #fff6d7;          /* color legible SOBRE el fondo oscuro del libro */
      --book-fg-muted: rgba(255,246,215,0.48);
      --cover-fg:      #0c1a29;
      --tab-on:        #0c1a29;
      --tab-on-fg:     #fff6d7;
    }
    body[data-theme="comedores"] {
      --chrome-fg:     #380906;
      --chrome-muted:  rgba(56,9,6,0.38);
      --chrome-faint:  rgba(56,9,6,0.18);
      --chrome-hover:  rgba(56,9,6,0.06);
      --book-bg:       #380906;
      --book-fg:       #fff6d7;
      --book-fg-muted: rgba(255,246,215,0.48);
      --cover-fg:      #380906;
      --tab-on:        #380906;
    }
    body[data-theme="alcobas"] {
      --chrome-bg:     #0c1a29;
      --chrome-fg:     #fff6d7;
      --chrome-muted:  rgba(255,246,215,0.42);
      --chrome-faint:  rgba(255,246,215,0.18);
      --chrome-hover:  rgba(255,246,215,0.1);
      --book-bg:       #fff6d7;
      --book-fg:       #0c1a29;
      --book-fg-muted: rgba(12,26,41,0.42);
      --cover-fg:      #fff6d7;
      --tab-on:        #fff6d7;
      --tab-on-fg:     #0c1a29;
    }
    body[data-theme="auxiliares"] {
      --chrome-bg:     #380906;
      --chrome-fg:     #fff6d7;
      --chrome-muted:  rgba(255,246,215,0.42);
      --chrome-faint:  rgba(255,246,215,0.18);
      --chrome-hover:  rgba(255,246,215,0.1);
      --book-bg:       #fff6d7;
      --book-fg:       #380906;
      --book-fg-muted: rgba(56,9,6,0.42);
      --cover-fg:      #fff6d7;
      --tab-on:        #fff6d7;
      --tab-on-fg:     #380906;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--book-bg);
      transition: background 0.45s ease;
      font-family: 'Helvetica LT Pro', Helvetica, Arial, sans-serif;
    }

    /* ── HEADER ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      background: var(--chrome-bg);
      transition: background 0.45s ease;
      box-shadow: 0 2px 28px rgba(0,0,0,0.07);
      z-index: 100;
    }

    #header-isotipo { height: 34px; width: auto; }
    #header-isotipo path { fill: var(--chrome-fg); transition: fill 0.45s ease; }

    #header-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      max-width: calc(100vw - 160px);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #header-center::-webkit-scrollbar { display: none; }

    .nav-tab {
      padding: 7px 20px;
      border-radius: 100px;
      border: 2px solid var(--chrome-faint);
      background: transparent;
      color: var(--chrome-muted);
      font-family: inherit;
      font-size: 0.59rem;
      letter-spacing: 0.18em;
      text-transform: none;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .nav-tab:hover:not(.pronto) {
      border-color: var(--chrome-fg);
      color: var(--chrome-fg);
    }
    .nav-tab.active {
      background: var(--tab-on);
      color: var(--tab-on-fg);
      border-color: transparent;
    }
    .nav-tab.pronto { opacity: 0.38; cursor: default; }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px) {
      #btn-fs { display: none; }
      #header-center { max-width: calc(100vw - 64px); }
      .nav-tab { padding: 5px 13px; font-size: 0.52rem; letter-spacing: 0.1em; }
      .ctrl-btn { width: 38px; height: 38px; }
    }

    /* ── LOADING ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--book-bg);
      transition: background 0.45s ease, opacity 0.5s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 300;
      gap: 1.4rem;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    #loading.hidden   { display: none !important; }

    #loading-wordmark { height: 72px; width: auto; max-width: 80vw; }
    #loading-wordmark path { fill: var(--book-fg); transition: fill 0.45s ease; }

    .loading-dots {
      display: flex;
      gap: 9px;
      align-items: center;
      margin-top: 6px;
    }
    .loading-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--book-fg);
      opacity: 0.15;
      animation: dotWave 1.4s ease-in-out infinite both;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.22s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.44s; }
    @keyframes dotWave {
      0%, 60%, 100% { opacity: 0.15; transform: translateY(0); }
      30% { opacity: 1;   transform: translateY(-7px); }
    }
    #loading-pct {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: var(--book-fg-muted);
      font-family: inherit;
      min-height: 1.2em;
    }
    #loading-error {
      display: none;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--book-fg-muted);
      text-align: center;
      line-height: 2.2;
    }

    /* ── BOOK ── */
    #book-container {
      position: fixed;
      top: 64px; bottom: 62px; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }
    #book {
      position: relative;
    }
    .pf-page img {
      width: 100%; height: 100%;
      object-fit: fill;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      border-radius: 0;
    }
    /* Round outer corners only (spine side stays square, like a real book) */
    .stf__item.--left  .pf-page img { border-radius: 14px 0 0 14px; }
    .stf__item.--right .pf-page img { border-radius: 0 14px 14px 0; }
    /* ── PORTADA ── */
    #cover-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: var(--book-bg);
      transition: background 0.45s ease, opacity 0.35s ease;
      z-index: 20;
    }
    #cover-overlay svg { max-width: 100%; max-height: 100%; display: block; }

    /* ── CONTROLES ── */
    #controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.8rem;
      background: var(--chrome-bg);
      transition: background 0.45s ease;
      box-shadow: 0 -2px 28px rgba(0,0,0,0.05);
      z-index: 100;
    }
    .ctrl-btn {
      width: 42px; height: 42px;
      background: transparent;
      border: 2px solid var(--chrome-faint);
      border-radius: 14px;
      color: var(--chrome-fg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      font-family: inherit;
    }
    .ctrl-btn:hover { background: var(--chrome-hover); border-color: var(--chrome-fg); }

    #page-indicator {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--chrome-muted);
      min-width: 110px;
      text-align: center;
    }
    #page-indicator b { color: var(--chrome-fg); font-weight: 400; }

    #btn-fs {
      background: transparent;
      border: none;
      color: var(--chrome-muted);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s;
      white-space: nowrap;
    }
    #btn-fs:hover { color: var(--chrome-fg); }
  </style>
</head>

  function coverSvgStr(W, H, subtitle, bgColor, fgColor) {
    const s = W / 550, cx = r(W/2), cy = r(H/2);
    const lW = r(290*s), lH = r(lW*155/578);
    const lX = r(cx - lW/2), lY = r(cy - lH/2 - 28*s);
    const tY = r(cy + 22*s), fs = r(11*s);
    const rx = r(22 * s);
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="max-width:100%;max-height:100%;display:block;border-radius:${rx}px">
  <rect width="${W}" height="${H}" fill="${bgColor}" rx="${rx}"/>
  <svg x="${lX}" y="${lY}" width="${lW}" height="${lH}" viewBox="118 115 578 155" overflow="visible">
    ${logoSvgPaths(fgColor)}
  </svg>
  <text x="${cx}" y="${tY}" text-anchor="middle" fill="${fgColor}" font-family="Helvetica,Arial,sans-serif" font-weight="700" font-size="${fs}" letter-spacing="2">${xe(subtitle)}</text>
</svg>`;
  }

  function backCoverSvgUrl(W, H, subtitle, bgColor, fgColor) {
    const s = W / 550, cx = r(W/2), cy = r(H/2);
    const lW = r(200*s), lH = r(lW*155/578);
    const lX = r(cx - lW/2), lY = r(cy - lH/2);
    const lw = Math.max(1, r(0.7*s));
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
  <rect width="${W}" height="${H}" fill="${bgColor}"/>
  <text x="${cx}" y="${cy - r(90*s)}" text-anchor="middle" fill="${fgColor}" fill-opacity="0.45" font-family="Helvetica,Arial,sans-serif" font-weight="700" font-size="${r(9*s)}" letter-spacing="${r(5*s)}">DISE&#209;O &amp; CONFORT</text>
  <svg x="${lX}" y="${lY}" width="${lW}" height="${lH}" viewBox="118 115 578 155">
    ${logoSvgPaths(fgColor)}
  </svg>
  <line x1="${cx - r(20*s)}" y1="${cy + r(46*s)}" x2="${cx + r(20*s)}" y2="${cy + r(46*s)}" stroke="${fgColor}" stroke-opacity="0.3" stroke-width="${lw}"/>
  <text x="${cx}" y="${cy + r(68*s)}" text-anchor="middle" fill="${fgColor}" fill-opacity="0.45" font-family="Helvetica,Arial,sans-serif" font-size="${r(9*s)}" letter-spacing="${r(4*s)}">${xe(subtitle.toUpperCase())} DE DISE&#209;O</text>
</svg>`;
    return URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml;charset=utf-8' }));
  }

  // ── Helpers compartidos ──────────────────────────────────────────────────
  function applyPageFlip(bookEl, coverEl, indicator, cat, urls, cvW, cvH, ratio) {
    const avW = window.innerWidth  - 32;
    const avH = window.innerHeight - 64 - 62 - 32;

    // Si la mitad del ancho disponible es muy angosta para leer, modo retrato (1 página)
    const portrait = Math.floor(avW / 2) < 280;

    let PF_W, PF_H;
    if (portrait) {
      if (avW * ratio <= avH) { PF_W = avW; PF_H = Math.round(PF_W * ratio); }
      else                    { PF_H = avH; PF_W = Math.round(PF_H / ratio); }
      bookEl.style.width  = PF_W + 'px';
    } else {
      const halfW = Math.floor(avW / 2);
      if (halfW * ratio <= avH) { PF_W = halfW; PF_H = Math.round(PF_W * ratio); }
      else                      { PF_H = avH;   PF_W = Math.round(PF_H / ratio); }
      bookEl.style.width  = (PF_W * 2) + 'px';
    }
    bookEl.style.height = PF_H + 'px';

    urls.forEach(url => {
      const div = document.createElement('div');
      div.className = 'pf-page';
      const img = document.createElement('img');
      img.src = url;
      div.appendChild(img);
      bookEl.appendChild(div);
    });

    pfInst = new St.PageFlip(bookEl, {
      width: PF_W, height: PF_H,
      showCover: false,
      mobileScrollSupport: true,
      drawShadow: true,
      flippingTime: 650,
      usePortrait: portrait,
      startZIndex: 1,
    });
    pfInst.loadFromHTML(bookEl.querySelectorAll('.pf-page'));
    pfInst.on('flip', updateIndicator);

    coverEl.innerHTML = coverSvgStr(cvW, cvH, cat.subtitle, cat.coverBg, cat.coverFg);
    coverEl.style.display = 'flex';
    coverEl.style.opacity = '1';

    document.getElementById('page-indicator').innerHTML = '<b>Portada</b>';
    isOnCover = true;
  }

  // ── Carga un catálogo ────────────────────────────────────────────────────
  function loadCatalog(id) {
    if (id === currentId || isSwitching) return;
    const cat = CATALOGS[id];
    if (!cat) return;

    isSwitching = true;

    document.querySelectorAll('.nav-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.catalog === id)
    );
    document.body.dataset.theme = cat.theme;

    const coverEl   = document.getElementById('cover-overlay');
    const indicator = document.getElementById('page-indicator');

    if (pfInst) { try { pfInst.destroy(); } catch(e) {} pfInst = null; }
    const bc = document.getElementById('book-container');
    const ob = document.getElementById('book');
    if (ob) ob.remove();
    const bookEl = document.createElement('div');
    bookEl.id = 'book';
    bc.appendChild(bookEl);

    coverEl.innerHTML = '';
    coverEl.style.display = 'none';
    coverEl.style.opacity = '0';

    // Próximamente (sin imágenes)
    if (!cat.pages) {
      coverEl.style.cssText = 'display:flex;align-items:center;justify-content:center;opacity:1;';
      const msg = document.createElement('div');
      msg.style.cssText = 'text-align:center;';
      msg.innerHTML =
        `<div style="font-size:.55rem;letter-spacing:.4em;text-transform:uppercase;color:var(--cover-fg);opacity:.45;margin-bottom:1rem">${cat.label}</div>
         <div style="font-size:1.4rem;letter-spacing:.15em;text-transform:uppercase;color:var(--cover-fg);font-weight:700">Pr&#243;ximamente</div>`;
      coverEl.appendChild(msg);
      indicator.innerHTML = `<b>${cat.label}</b>`;
      isOnCover = false;
      currentId = id;
      isSwitching = false;
      return;
    }

    // URLs de imágenes pre-renderizadas — instantáneo, sin PDF.js
    const cvW  = 1600;
    const cvH  = Math.round(cvW * cat.ratio);
    const urls = Array.from({ length: cat.pages }, (_, i) =>
      `pages/${id}/p${String(i + 1).padStart(2, '0')}.jpg`
    );
    urls.push(backCoverSvgUrl(cvW, cvH, cat.subtitle, cat.backBg, cat.backFg));

    applyPageFlip(bookEl, coverEl, indicator, cat, urls, cvW, cvH, cat.ratio);
    currentId   = id;
    isSwitching = false;
  }

  function updateIndicator() {
    if (!pfInst) return;
    const ind = document.getElementById('page-indicator');
    const p = pfInst.getCurrentPageIndex();
    const t = pfInst.getPageCount();
    ind.innerHTML = p >= t - 1 ? '<b>Contraportada</b>' : `<b>${p+1}</b> / ${t-1}`;
  }

  function goToBook() {
    const c = document.getElementById('cover-overlay');
    isOnCover = false;
    c.style.opacity = '0';
    setTimeout(() => { c.style.display = 'none'; }, 360);
    updateIndicator();
  }

  function goToCover() {
    const c = document.getElementById('cover-overlay');
    isOnCover = true;
    c.style.display = 'flex';
    requestAnimationFrame(() => { c.style.opacity = '1'; });
    document.getElementById('page-indicator').innerHTML = '<b>Portada</b>';
  }

  function init() {
    document.querySelectorAll('.nav-tab').forEach(tab =>
      tab.addEventListener('click', () => loadCatalog(tab.dataset.catalog))
    );

    document.getElementById('btn-next').addEventListener('click', () => {
      if (isOnCover) goToBook();
      else if (pfInst) pfInst.flipNext();
    });
    document.getElementById('btn-prev').addEventListener('click', () => {
      if (!isOnCover && pfInst?.getCurrentPageIndex() === 0) goToCover();
      else if (!isOnCover && pfInst) pfInst.flipPrev();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        if (isOnCover) goToBook(); else if (pfInst) pfInst.flipNext();
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        if (!isOnCover && pfInst?.getCurrentPageIndex() === 0) goToCover();
        else if (!isOnCover && pfInst) pfInst.flipPrev();
      }
    });

    document.getElementById('btn-fs').addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
      else document.exitFullscreen();
    });
    document.addEventListener('fullscreenchange', () => {
      document.getElementById('btn-fs').textContent =
        document.fullscreenElement ? '✕ Salir' : '⛶ Pantalla completa';
    });

    // Reiniciar el libro al girar el dispositivo o cambiar tamaño de ventana
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (!currentId || isSwitching || isOnCover) return;
        const cached = catalogCache[currentId];
        if (!cached || !CATALOGS[currentId]?.pdf) return;
        const cat = CATALOGS[currentId];
        const savedPage = pfInst ? pfInst.getCurrentPageIndex() : 0;

        if (pfInst) { try { pfInst.destroy(); } catch(e) {} pfInst = null; }
        const bc = document.getElementById('book-container');
        const ob = document.getElementById('book');
        if (ob) ob.remove();
        const nb = document.createElement('div');
        nb.id = 'book';
        bc.appendChild(nb);

        const coverEl  = document.getElementById('cover-overlay');
        const indicator = document.getElementById('page-indicator');
        coverEl.style.display = 'none';
        coverEl.style.opacity = '0';

        applyPageFlip(nb, coverEl, indicator, cat, cached.urls, cached.cvW, cached.cvH, cached.ratio);
        isOnCover = false;
        if (savedPage > 0 && pfInst) setTimeout(() => pfInst?.turnToPage(savedPage), 60);
        updateIndicator();
      }, 350);
    });

    // Splash inicial: se muestra brevemente mientras el primer catálogo inicializa
    const loadingEl = document.getElementById('loading');
    loadingEl.style.display = 'flex';
    loadCatalog('salas');
    setTimeout(() => {
      loadingEl.classList.add('fade-out');
      setTimeout(() => {
        loadingEl.style.display = 'none';
        loadingEl.classList.remove('fade-out');
      }, 550);
    }, 1200);
  }

  init();
</script>
</body>
</html>
